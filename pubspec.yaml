name: expense_tracker_app
description: Flutter expense tracker — clean architecture, SQLite, Provider, fl_chart.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  fl_chart: ^0.69.2
  intl: ^0.20.2
  http: ^1.2.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
